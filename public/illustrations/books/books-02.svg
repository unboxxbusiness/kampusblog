<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Library Bookshelf grid (Blue/Slate) -->
  <g transform="translate(180, 160)">
    <!-- Shelf frame -->
    <rect x="0" y="0" width="440" height="250" rx="14" fill="#ffffff" stroke="#475569" stroke-width="4" />
    <line x1="0" y1="125" x2="440" y2="125" stroke="#475569" stroke-width="4.5" />

    <!-- Top Shelf Books -->
    <!-- Book 1 (Indigo standing) -->
    <rect x="30" y="20" width="30" height="105" rx="3" fill="#6366f1" stroke="#475569" stroke-width="3" />
    <line x1="45" y1="35" x2="45" y2="95" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <!-- Book 2 (Blue standing) -->
    <rect x="60" y="10" width="35" height="115" rx="3" fill="#3b82f6" stroke="#475569" stroke-width="3" />
    <line x1="77" y1="25" x2="77" y2="95" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <!-- Book 3 (Slate leaning) -->
    <g transform="translate(100, 30) rotate(15)">
      <rect x="0" y="0" width="30" height="100" rx="3" fill="#f8fafc" stroke="#475569" stroke-width="3" />
      <line x1="15" y1="15" x2="15" y2="85" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Bottom Shelf Books -->
    <!-- Book stack horizontal -->
    <g transform="translate(240, 160)">
      <rect x="0" y="30" width="160" height="35" rx="4" fill="#3b82f6" stroke="#475569" stroke-width="3" />
      <rect x="15" y="0" width="135" height="30" rx="4" fill="#ffffff" stroke="#475569" stroke-width="3" />
      <line x1="35" y1="15" x2="110" y2="15" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M 140 100 L 143 107 L 150 110 L 143 113 L 150 120 L 147 113 L 140 110 L 147 107 Z" fill="#3b82f6" opacity="0.6" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
