<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Stack of Books (Left side composition) -->
  <g transform="translate(180, 180)">
    <!-- Book 1 (Bottom, Orange) -->
    <rect x="10" y="160" width="200" height="40" rx="6" fill="#fff7ed" stroke="#475569" stroke-width="3" />
    <rect x="10" y="160" width="30" height="40" fill="#f97316" stroke="#475569" stroke-width="3" />
    <line x1="60" y1="180" x2="180" y2="180" stroke="#f97316" stroke-width="2" stroke-linecap="round" />

    <!-- Book 2 (Middle, Slate) -->
    <rect x="25" y="115" width="180" height="45" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="3" />
    <rect x="25" y="115" width="35" height="45" fill="#475569" stroke="#475569" stroke-width="3" />
    <line x1="80" y1="138" x2="170" y2="138" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />

    <!-- Book 3 (Top, Blue) -->
    <rect x="40" y="70" width="150" height="45" rx="6" fill="#eff6ff" stroke="#475569" stroke-width="3" />
    <rect x="40" y="70" width="30" height="45" fill="#3b82f6" stroke="#475569" stroke-width="3" />
    <line x1="90" y1="92" x2="160" y2="92" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Open Vertical Book (Right side) -->
  <g transform="translate(440, 150) rotate(-4)">
    <!-- Cover -->
    <path d="M 40 40 L 40 220 Q 120 200, 200 220 L 200 40 Q 120 20, 40 40 Z" fill="#3b82f6" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Pages inside -->
    <path d="M 50 50 L 50 210 Q 120 192, 190 210 L 190 50 Q 120 32, 50 50 Z" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <line x1="120" y1="36" x2="120" y2="201" stroke="#475569" stroke-width="2" />
    <!-- Line representation of text -->
    <line x1="70" y1="80" x2="105" y2="80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    <line x1="70" y1="105" x2="100" y2="105" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    <line x1="70" y1="130" x2="105" y2="130" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    
    <line x1="135" y1="80" x2="170" y2="80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    <line x1="135" y1="105" x2="165" y2="105" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    <line x1="135" y1="130" x2="170" y2="130" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Magnifying Glass overlay (Academic search) -->
  <g transform="translate(360, 240) rotate(15)">
    <circle cx="35" cy="35" r="22" fill="#ffffff" fill-opacity="0.8" stroke="#475569" stroke-width="3" />
    <line x1="51" y1="51" x2="75" y2="75" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 23 23 A 12 12 0 0 1 42 18" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Sparkles -->
  <path d="M 390 100 L 393 107 L 400 110 L 393 113 L 390 120 L 387 113 L 380 110 L 387 107 Z" fill="#f97316" opacity="0.7" />
  <circle cx="150" cy="120" r="5" fill="#cbd5e1" />
</svg>
