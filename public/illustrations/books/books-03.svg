<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- E-Reader / Tablet showing Digital Reading (Blue theme - Left) -->
  <g transform="translate(180, 180) rotate(-3)">
    <rect x="0" y="0" width="180" height="230" rx="16" fill="#ffffff" stroke="#475569" stroke-width="4" />
    <rect x="12" y="12" width="156" height="206" rx="8" fill="#f0fdff" />
    
    <!-- Code/Text rows inside screen -->
    <line x1="30" y1="40" x2="150" y2="40" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" />
    <line x1="30" y1="65" x2="130" y2="65" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="30" y1="85" x2="140" y2="85" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- E-book page bookmark ribbon -->
    <polygon points="120,12 140,12 140,50 130,40 120,50" fill="#3b82f6" stroke="#475569" stroke-width="2" stroke-linejoin="round" />

    <!-- Reading Progress Slider -->
    <rect x="30" y="180" width="120" height="8" rx="4" fill="#cbd5e1" />
    <rect x="30" y="180" width="80" height="8" rx="4" fill="#3b82f6" />
    <circle cx="110" cy="184" r="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" />
  </g>

  <!-- Pile of books next to tablet (Right side) -->
  <g transform="translate(430, 240) rotate(5)">
    <rect x="0" y="80" width="160" height="40" rx="5" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <rect x="0" y="80" width="30" height="40" fill="#3b82f6" stroke="#475569" stroke-width="3" />
    
    <rect x="15" y="45" width="135" height="35" rx="4" fill="#eff6ff" stroke="#475569" stroke-width="3" />
    <rect x="15" y="45" width="25" height="35" fill="#475569" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Sparkles -->
  <path d="M 400 120 L 403 127 L 410 130 L 403 133 L 400 140 L 397 133 L 390 130 L 397 137 Z" fill="#3b82f6" opacity="0.6" />
  <circle cx="140" cy="140" r="5" fill="#cbd5e1" />
</svg>
