<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Study Desk workspace (Indigo theme) -->
  <g transform="translate(180, 200)">
    <!-- Cabinet drawer -->
    <rect x="0" y="110" width="100" height="100" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="3" />
    <line x1="0" y1="160" x2="100" y2="160" stroke="#475569" stroke-width="3" />
    <circle cx="50" cy="135" r="5" fill="#475569" />
    <circle cx="50" cy="185" r="5" fill="#475569" />

    <!-- Open book/study guide on desk -->
    <g transform="translate(120, 80)">
      <polygon points="10,0 170,0 185,30 -5,30" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
      <line x1="90" y1="0" x2="90" y2="30" stroke="#475569" stroke-width="2" />
    </g>
  </g>

  <!-- Glowing lightbulb (Knowledge/Idea - Left side) -->
  <g transform="translate(130, 110)">
    <circle cx="40" cy="50" r="30" fill="#f5f3ff" stroke="#475569" stroke-width="3" />
    <!-- Glowing rays -->
    <line x1="40" y1="10" x2="40" y2="18" stroke="#6366f1" stroke-width="2" />
    <line x1="10" y1="50" x2="18" y2="50" stroke="#6366f1" stroke-width="2" />
    <line x1="70" y1="50" x2="62" y2="50" stroke="#6366f1" stroke-width="2" />
    <rect x="30" y="80" width="20" height="8" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Laptop / computer monitor (Right side) -->
  <g transform="translate(450, 170) rotate(4)">
    <rect x="0" y="0" width="160" height="110" rx="8" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <rect x="12" y="12" width="136" height="76" rx="4" fill="#e0e7ff" />
    <circle cx="80" cy="50" r="14" fill="#6366f1" stroke="#475569" stroke-width="2" />
    <!-- Stand -->
    <rect x="70" y="110" width="20" height="30" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Sparkles -->
  <path d="M 390 100 L 393 107 L 400 110 L 393 113 L 390 120 L 387 113 L 380 110 L 387 107 Z" fill="#6366f1" opacity="0.6" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
