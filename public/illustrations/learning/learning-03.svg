<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Digital Brain Synapses (Indigo Theme - Center) -->
  <g transform="translate(260, 110)">
    <!-- Outer brain cloud boundaries (Slate/Indigo) -->
    <!-- Left hemisphere -->
    <path d="M 140 160 C 100 160, 80 140, 80 120 C 80 90, 100 80, 110 80 C 100 60, 120 30, 150 30 C 170 30, 185 45, 190 60 L 190 160 Z" fill="none" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
    <path d="M 120 160 C 90 160, 50 180, 50 140 C 50 110, 80 110, 80 120" fill="none" stroke="#475569" stroke-width="3.5" />
    
    <!-- Right hemisphere -->
    <path d="M 190 160 C 230 160, 250 140, 250 120 C 250 90, 230 80, 220 80 C 230 60, 210 30, 180 30 C 160 30, 145 45, 140 60 L 140 160 Z" fill="none" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
    <path d="M 210 160 C 240 160, 280 180, 280 140 C 280 110, 250 110, 250 120" fill="none" stroke="#475569" stroke-width="3.5" />

    <!-- Brain Stem -->
    <rect x="125" y="160" width="80" height="40" rx="4" fill="#6366f1" stroke="#475569" stroke-width="3.5" />
    <line x1="140" y1="180" x2="190" y2="180" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />

    <!-- Connection Nodes (Synapses) inside hemispheres -->
    <circle cx="110" cy="80" r="8" fill="#6366f1" stroke="#475569" stroke-width="2" />
    <circle cx="150" cy="50" r="6" fill="#cbd5e1" stroke="#475569" stroke-width="1.5" />
    <circle cx="170" cy="110" r="10" fill="#6366f1" stroke="#475569" stroke-width="2" />
    <circle cx="210" cy="70" r="8" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
    <circle cx="220" cy="120" r="7" fill="#6366f1" stroke="#475569" stroke-width="2" />

    <!-- Connective lines -->
    <line x1="118" y1="80" x2="160" y2="110" stroke="#6366f1" stroke-width="2" />
    <line x1="150" y1="56" x2="170" y2="100" stroke="#cbd5e1" stroke-width="1.5" />
  </g>

  <!-- Sparkles -->
  <path d="M 210 90 L 213 97 L 220 100 L 213 103 L 210 110 L 207 103 L 200 100 L 207 97 Z" fill="#6366f1" opacity="0.6" />
  <circle cx="610" cy="220" r="5" fill="#cbd5e1" />
</svg>
