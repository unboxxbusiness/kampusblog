<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Trending Bar Charts (Growth/Career Steps) -->
  <g transform="translate(140, 180)">
    <!-- Bar 1 -->
    <rect x="0" y="150" width="45" height="80" rx="6" fill="#fef3c7" stroke="#475569" stroke-width="3" />
    <!-- Bar 2 -->
    <rect x="65" y="110" width="45" height="120" rx="6" fill="#ffe3e3" stroke="#475569" stroke-width="3" />
    <!-- Bar 3 (Orange) -->
    <rect x="130" y="60" width="45" height="170" rx="6" fill="#f97316" stroke="#475569" stroke-width="3" />
    <path d="M 22 140 L 87 100 L 152 50" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round" />
    <circle cx="152" cy="50" r="6" fill="#f97316" />
  </g>

  <!-- Career Rocket Launching (Right side composition) -->
  <g transform="translate(420, 110)">
    <!-- Jet Flame / Trails -->
    <path d="M 120 220 C 120 260, 60 300, 60 300 Q 110 270, 120 240" fill="#ffedd5" stroke="#f97316" stroke-width="2" />
    <path d="M 130 220 C 130 270, 170 300, 170 300 Q 140 270, 130 240" fill="#ffedd5" stroke="#f97316" stroke-width="2" />
    <path d="M 125 210 L 125 280" stroke="#f97316" stroke-width="3" stroke-dasharray="6,6" />

    <!-- Rocket Body -->
    <!-- Fins -->
    <path d="M 90 200 L 70 230 L 105 220 Z" fill="#475569" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <path d="M 160 200 L 180 230 L 145 220 Z" fill="#475569" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Body -->
    <path d="M 100 130 C 100 80, 125 30, 125 30 C 125 30, 150 80, 150 130 L 150 210 L 100 210 Z" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Nose cone -->
    <path d="M 108 70 C 108 70, 125 30, 125 30 C 125 30, 142 70, 142 70 Z" fill="#f97316" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Window -->
    <circle cx="125" cy="115" r="14" fill="#ffedd5" stroke="#475569" stroke-width="3" />
    <circle cx="125" cy="115" r="6" fill="#f97316" />
  </g>

  <!-- Navigation Compass Icon (Top Left) -->
  <g transform="translate(180, 100)">
    <circle cx="40" cy="40" r="30" fill="none" stroke="#475569" stroke-width="3" />
    <polygon points="40,20 48,40 40,48" fill="#f97316" stroke="#475569" stroke-width="2" />
    <polygon points="40,60 48,40 40,48" fill="#ffffff" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Sparkles -->
  <path d="M 370 70 L 373 77 L 380 80 L 373 83 L 370 90 L 367 83 L 360 80 L 367 77 Z" fill="#f97316" opacity="0.7" />
  <circle cx="380" cy="270" r="5" fill="#cbd5e1" />
</svg>
