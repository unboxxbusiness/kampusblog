<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Career Goal target bullseye (Orange/Slate - Left) -->
  <g transform="translate(180, 160)">
    <circle cx="80" cy="80" r="70" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <circle cx="80" cy="80" r="46" fill="#fdf2e9" stroke="#f97316" stroke-width="2.5" />
    <circle cx="80" cy="80" r="22" fill="#f97316" stroke="#f97316" stroke-width="2.5" />

    <!-- Dart hit -->
    <g transform="translate(80, 80) rotate(-35)">
      <line x1="0" y1="0" x2="110" y2="0" stroke="#475569" stroke-width="3.5" stroke-linecap="round" />
      <polygon points="90,-6 110,-10 105,0 110,10 90,6" fill="#f97316" stroke="#475569" stroke-width="2" stroke-linejoin="round" />
      <polygon points="0,0 -10,-4 -10,4" fill="#475569" />
    </g>
  </g>

  <!-- Career Path / Staircase steps (Right side) -->
  <g transform="translate(430, 150)">
    <!-- Stairs steps -->
    <path d="M 0 220 L 50 220 L 50 170 L 100 170 L 100 120 L 150 120 L 150 70 L 220 70" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Student standing on steps/launching flag -->
    <g transform="translate(170, 0)">
      <!-- Flag pole -->
      <line x1="10" y1="20" x2="10" y2="70" stroke="#475569" stroke-width="3" stroke-linecap="round" />
      <!-- Flag banner -->
      <polygon points="10,20 60,35 10,50" fill="#f97316" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
    </g>

    <!-- Dash connector showing progress -->
    <path d="M 25 210 Q 75 160, 125 110" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="4,4" />
  </g>

  <!-- Sparkles -->
  <path d="M 370 110 L 373 117 L 380 120 L 373 123 L 370 130 L 367 123 L 360 120 L 367 117 Z" fill="#f97316" opacity="0.6" />
  <circle cx="120" cy="120" r="5" fill="#cbd5e1" />
</svg>
