<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Career Idea Bulb with Gears inside (Orange/Slate - Center Left) -->
  <g transform="translate(190, 110)">
    <!-- Bulb Glass Outline -->
    <path d="M 80 30 C 40 30, 30 75, 50 100 L 50 130 L 110 130 L 110 100 C 130 75, 120 30, 80 30 Z" fill="#ffffff" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
    
    <!-- Gears inside the bulb (represented geometrically) -->
    <circle cx="80" cy="80" r="28" fill="none" stroke="#f97316" stroke-width="5" />
    <circle cx="80" cy="80" r="10" fill="none" stroke="#475569" stroke-width="2" />
    <!-- Gear teeth -->
    <rect x="76" y="46" width="8" height="10" fill="#f97316" stroke="#475569" stroke-width="1.5" />
    <rect x="76" y="104" width="8" height="10" fill="#f97316" stroke="#475569" stroke-width="1.5" />
    <rect x="46" y="76" width="10" height="8" fill="#f97316" stroke="#475569" stroke-width="1.5" />
    <rect x="104" y="76" width="10" height="8" fill="#f97316" stroke="#475569" stroke-width="1.5" />

    <!-- Metal Base -->
    <rect x="65" y="130" width="30" height="8" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="68" y="138" width="24" height="8" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <path d="M 72 146 Q 80 152, 88 146" fill="none" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Professional briefcase & check checklist (Right side) -->
  <g transform="translate(460, 200) rotate(6)">
    <rect x="0" y="0" width="140" height="170" rx="10" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <line x1="20" y1="35" x2="120" y2="35" stroke="#f97316" stroke-width="3.5" stroke-linecap="round" />
    <line x1="20" y1="65" x2="90" y2="65" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />
    
    <circle cx="30" cy="110" r="10" fill="none" stroke="#10b981" stroke-width="2" />
    <path d="M 25 110 L 28 113 L 35 105" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="110" x2="115" y2="110" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Sparkles -->
  <path d="M 380 90 L 383 97 L 390 100 L 383 103 L 380 110 L 377 103 L 370 100 L 377 97 Z" fill="#f97316" opacity="0.6" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
