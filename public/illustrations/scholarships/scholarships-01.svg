<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Grid -->
  <rect width="100%" height="100%" fill="none" />
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.5" />

  <!-- Base Line -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Mortarboard/Graduation Cap (Emerald/Slate) -->
  <g transform="translate(180, 180)">
    <!-- Cap Diamond -->
    <polygon points="120,20 220,60 120,100 20,60" fill="#10b981" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Cap Skull Base -->
    <path d="M 70 79 L 70 120 C 70 140, 170 140, 170 120 L 170 79" fill="#f8fafc" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Tassel -->
    <path d="M 120 60 L 50 85 L 50 115" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="45" y="115" width="10" height="15" fill="#10b981" stroke="#475569" stroke-width="2" rx="2" />
  </g>

  <!-- Scholarship Grant Check/Doc (Emerald Accent) -->
  <g transform="translate(430, 200) rotate(5)">
    <!-- Shadow -->
    <rect x="6" y="6" width="180" height="130" rx="12" fill="#e2e8f0" />
    <!-- Main Check -->
    <rect x="0" y="0" width="180" height="130" rx="12" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <!-- Bank Seal Logo -->
    <circle cx="35" cy="35" r="15" fill="#e6f4ea" stroke="#10b981" stroke-width="2" />
    <path d="M 30 35 L 33 38 L 40 31" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Decorative Lines -->
    <line x1="65" y1="30" x2="150" y2="30" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="65" y1="45" x2="120" y2="45" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    <!-- Amount Value -->
    <rect x="25" y="75" width="130" height="35" rx="6" fill="#e6f4ea" stroke="#10b981" stroke-width="2" />
    <!-- Currencies / Text line -->
    <text x="35" y="98" font-family="sans-serif" font-size="16" font-weight="900" fill="#10b981">$ GRANT</text>
  </g>

  <!-- Growing Plant/Arrow (Success) -->
  <g transform="translate(130, 280)">
    <path d="M 20 100 Q 40 50, 80 20" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="4,4" />
    <path d="M 70 20 L 80 20 L 80 30" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" />
    <circle cx="20" cy="100" r="6" fill="#475569" />
  </g>

  <!-- Sparkles -->
  <path d="M 400 130 L 403 137 L 410 140 L 403 143 L 400 150 L 397 143 L 390 140 L 397 137 Z" fill="#10b981" opacity="0.6" />
  <circle cx="340" cy="220" r="5" fill="#cbd5e1" />
</svg>
