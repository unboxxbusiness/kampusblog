<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Classic Hourglass (Time management / Productivity - Left side) -->
  <g transform="translate(180, 150) rotate(-6)">
    <!-- Wooden Top / Bottom Bases -->
    <rect x="20" y="0" width="100" height="15" rx="3" fill="#cbd5e1" stroke="#475569" stroke-width="3.5" />
    <rect x="20" y="205" width="100" height="15" rx="3" fill="#cbd5e1" stroke="#475569" stroke-width="3.5" />

    <!-- Glass bulb bodies -->
    <path d="M 30 15 L 30 80 C 30 105, 55 110, 70 110 C 85 110, 110 105, 110 80 L 110 15 Z" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <path d="M 30 205 L 30 140 C 30 115, 55 110, 70 110 C 85 110, 110 115, 110 140 L 110 205 Z" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Sand falling (Orange) -->
    <!-- Top sand reservoir -->
    <path d="M 40 45 Q 70 85, 100 45 Z" fill="#ffedd5" stroke="#f97316" stroke-width="2" />
    <!-- Bottom sand reservoir -->
    <path d="M 40 200 Q 70 150, 100 200 Z" fill="#f97316" stroke="#f97316" stroke-width="2" />
    <!-- Trickle path -->
    <line x1="70" y1="90" x2="70" y2="160" stroke="#f97316" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="4,4" />
  </g>

  <!-- Clean Tasks Dashboard/Calendar layout (Right side - Task completion) -->
  <g transform="translate(430, 170) rotate(4)">
    <!-- Main Board -->
    <rect x="0" y="0" width="180" height="190" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    
    <!-- Board Header -->
    <path d="M 0 14 Q 0 0, 14 0 L 166 0 Q 180 0, 180 14 L 180 35 L 0 35 Z" fill="#e0e7ff" stroke="#475569" stroke-width="3.5" />
    <line x1="20" y1="18" x2="60" y2="18" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round" />

    <!-- Checklist rows -->
    <!-- Row 1 -->
    <g transform="translate(20, 55)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#6366f1" stroke-width="2.5" />
      <path d="M 7 12 L 10 15 L 17 8" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" />
      <line x1="32" y1="12" x2="130" y2="12" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    </g>
    <!-- Row 2 -->
    <g transform="translate(20, 95)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#94a3b8" stroke-width="2.5" />
      <line x1="32" y1="12" x2="110" y2="12" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
    </g>
    <!-- Row 3 -->
    <g transform="translate(20, 135)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#6366f1" stroke-width="2.5" />
      <path d="M 7 12 L 10 15 L 17 8" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" />
      <line x1="32" y1="12" x2="125" y2="12" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M 370 100 L 373 107 L 380 110 L 373 113 L 370 120 L 367 113 L 360 110 L 367 107 Z" fill="#6366f1" opacity="0.7" />
  <circle cx="390" cy="270" r="5" fill="#cbd5e1" />
</svg>
