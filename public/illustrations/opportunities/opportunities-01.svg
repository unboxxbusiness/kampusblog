<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Open Door of Opportunity (Left side) -->
  <g transform="translate(180, 150)">
    <!-- Door Frame -->
    <path d="M 20 250 L 20 20 C 20 10, 120 10, 120 20 L 120 250" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Opened Door Panel (Emerald) -->
    <path d="M 20 250 L -30 220 L -30 -10 L 20 20 Z" fill="#10b981" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Door Handle -->
    <circle cx="-15" cy="110" r="6" fill="#ffedd5" stroke="#475569" stroke-width="2.5" />
    
    <!-- Light Shining Out of Doorway -->
    <polygon points="22,22 190,120 190,250 118,248" fill="#e6f4ea" opacity="0.3" />
  </g>

  <!-- Big Target with Bullseye & Arrow (Right side - Opportunities goal) -->
  <g transform="translate(460, 160)">
    <!-- Target Rings -->
    <circle cx="80" cy="80" r="75" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <circle cx="80" cy="80" r="50" fill="#fef3c7" stroke="#475569" stroke-width="2.5" />
    <circle cx="80" cy="80" r="25" fill="#f97316" stroke="#475569" stroke-width="2.5" />

    <!-- Hit Arrow (Orange/Slate) -->
    <g transform="translate(80, 80) rotate(-45)">
      <!-- Shaft -->
      <line x1="0" y1="0" x2="130" y2="0" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
      <!-- Feathers -->
      <polygon points="110,-8 130,-12 125,0 130,12 110,8" fill="#f97316" stroke="#475569" stroke-width="2" stroke-linejoin="round" />
      <!-- Tip (in bullseye) -->
      <polygon points="0,0 -12,-6 -12,6" fill="#475569" />
    </g>
  </g>

  <!-- Key to Success (Center top) -->
  <g transform="translate(370, 90) rotate(15)">
    <circle cx="20" cy="20" r="14" fill="none" stroke="#f97316" stroke-width="3.5" />
    <circle cx="20" cy="20" r="4" fill="#f97316" />
    <line x1="34" y1="20" x2="90" y2="20" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    <!-- Teeth -->
    <rect x="70" y="20" width="8" height="12" fill="#475569" rx="1" />
    <rect x="82" y="20" width="8" height="12" fill="#475569" rx="1" />
  </g>

  <!-- Sparkles -->
  <path d="M 140 100 L 143 107 L 150 110 L 143 113 L 150 120 L 147 113 L 140 110 L 147 107 Z" fill="#10b981" opacity="0.6" />
  <circle cx="390" cy="290" r="5" fill="#cbd5e1" />
</svg>
