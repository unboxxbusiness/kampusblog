<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Telescope (Searching for opportunities - Left) -->
  <g transform="translate(160, 130) rotate(-15)">
    <!-- Tripod stand -->
    <path d="M 60 180 L 30 260 M 60 180 L 90 260 M 60 180 L 60 270" stroke="#475569" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Main Telescope Tube (Emerald/Slate) -->
    <rect x="0" y="80" width="160" height="40" rx="6" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <rect x="130" y="75" width="40" height="50" rx="4" fill="#10b981" stroke="#475569" stroke-width="3.5" />
    
    <!-- Eyepiece -->
    <rect x="-20" y="90" width="20" height="20" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="2.5" />
  </g>

  <!-- Big Target Compass (Discovery aspect - Right side) -->
  <g transform="translate(460, 180)">
    <circle cx="70" cy="70" r="60" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <circle cx="70" cy="70" r="48" fill="none" stroke="#e6f4ea" stroke-width="2" />
    
    <!-- Compass Pointer -->
    <polygon points="70,25 78,70 70,78" fill="#10b981" stroke="#475569" stroke-width="2" />
    <polygon points="70,115 78,70 70,78" fill="#ffffff" stroke="#475569" stroke-width="2" />
    <circle cx="70" cy="70" r="6" fill="#475569" />
  </g>

  <!-- Sparkles -->
  <path d="M 400 100 L 403 107 L 410 110 L 403 113 L 400 120 L 397 113 L 390 110 L 397 107 Z" fill="#10b981" opacity="0.6" />
  <circle cx="150" cy="350" r="5" fill="#cbd5e1" />
</svg>
