<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base platform -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- The Globe (Global study aspect - Left) -->
  <g transform="translate(180, 160)">
    <!-- Globe Stand -->
    <path d="M 60 210 L 60 230" stroke="#475569" stroke-width="4" />
    <path d="M 30 235 L 90 235" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    <path d="M 60 20 C 130 20, 170 80, 170 110 C 170 150, 130 200, 60 200" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    
    <!-- Globe ball -->
    <circle cx="60" cy="110" r="75" fill="#f0fdff" stroke="#475569" stroke-width="3" />
    <!-- Latitude/Longitude Lines -->
    <path d="M -15 110 A 75 75 0 0 0 135 110" fill="none" stroke="#475569" stroke-width="2" />
    <path d="M 60 35 A 75 75 0 0 0 60 185" fill="none" stroke="#475569" stroke-width="2" />
    <ellipse cx="60" cy="110" rx="45" ry="75" fill="none" stroke="#e0f7fa" stroke-width="2" />

    <!-- Flight Flight Path (Dotted Arc) -->
    <path d="M 40 70 A 90 90 0 0 1 180 30" fill="none" stroke="#00bcd4" stroke-width="3" stroke-dasharray="5,5" />
    <!-- Airplane symbol -->
    <g transform="translate(180, 30) rotate(-15)">
      <polygon points="0,0 20,5 15,10 5,8 -5,12 0,5" fill="#00bcd4" stroke="#475569" stroke-width="1.5" />
    </g>
  </g>

  <!-- Passport / Boarding Pass (Right) -->
  <g transform="translate(460, 200) rotate(8)">
    <!-- Shadow -->
    <rect x="5" y="5" width="130" height="180" rx="10" fill="#e2e8f0" />
    <!-- Passport Book -->
    <rect x="0" y="0" width="130" height="180" rx="10" fill="#6366f1" stroke="#475569" stroke-width="3" />
    <!-- Gold crest pattern (Passport emblem) -->
    <circle cx="65" cy="80" r="22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="4,4" />
    <circle cx="65" cy="80" r="10" fill="none" stroke="#ffffff" stroke-width="2" />
    <line x1="45" y1="125" x2="85" y2="125" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="55" y1="140" x2="75" y2="140" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Map pin pointer (Center detail) -->
  <g transform="translate(420, 150)">
    <path d="M 20 0 C 8 0, 0 8, 0 20 C 0 35, 20 50, 20 50 C 20 50, 40 35, 40 20 C 40 8, 32 0, 20 0 Z" fill="#00bcd4" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <circle cx="20" cy="18" r="7" fill="#ffffff" />
  </g>

  <!-- Sparkles -->
  <path d="M 370 90 L 373 97 L 380 100 L 373 103 L 370 110 L 367 103 L 360 100 L 367 97 Z" fill="#6366f1" opacity="0.6" />
  <circle cx="150" cy="350" r="6" fill="#cbd5e1" />
</svg>
