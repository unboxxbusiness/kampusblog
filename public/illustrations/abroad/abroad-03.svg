<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Big Ben/Classical tower (International landmark - Left) -->
  <g transform="translate(190, 130)">
    <rect x="25" y="240" width="60" height="40" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="35" y="60" width="40" height="180" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    
    <!-- Clock dial -->
    <circle cx="55" cy="90" r="14" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <path d="M 55 90 L 55 83 M 55 90 L 61 90" stroke="#475569" stroke-width="1.5" />
    
    <!-- Roof Dome -->
    <polygon points="30,60 80,60 55,20" fill="#00bcd4" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
  </g>

  <!-- Global flight path arc (Center to Right) -->
  <g transform="translate(320, 110)">
    <path d="M -10 140 A 180 180 0 0 1 240 100" fill="none" stroke="#00bcd4" stroke-width="3" stroke-dasharray="5,5" />
    
    <!-- Floating cloud outlines (Travel aspect) -->
    <path d="M 120 70 Q 130 50, 150 60 Q 170 50, 180 70 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />

    <!-- Passport book outline (Right side) -->
    <g transform="translate(160, 130) rotate(15)">
      <rect x="0" y="0" width="80" height="110" rx="6" fill="#6366f1" stroke="#475569" stroke-width="3" />
      <circle cx="40" cy="50" r="14" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="3,3" />
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M 370 70 L 373 77 L 380 80 L 373 83 L 370 90 L 367 83 L 360 80 L 367 77 Z" fill="#00bcd4" opacity="0.6" />
  <circle cx="130" cy="220" r="5" fill="#cbd5e1" />
</svg>
