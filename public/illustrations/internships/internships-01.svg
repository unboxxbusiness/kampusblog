<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Modern Office Desk Workspace (Cyan/Slate) -->
  <g transform="translate(180, 200)">
    <!-- Desk Drawer Cabinet -->
    <rect x="0" y="110" width="100" height="100" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="3" />
    <line x1="0" y1="160" x2="100" y2="160" stroke="#475569" stroke-width="3" />
    <circle cx="50" cy="135" r="5" fill="#475569" />
    <circle cx="50" cy="185" r="5" fill="#475569" />

    <!-- Open Laptop on Desk -->
    <g transform="translate(120, 70)">
      <!-- Laptop Screen -->
      <rect x="15" y="0" width="150" height="100" rx="8" fill="#e0f7fa" stroke="#475569" stroke-width="3" />
      <!-- Code lines mock -->
      <line x1="30" y1="20" x2="80" y2="20" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" />
      <line x1="30" y1="40" x2="110" y2="40" stroke="#475569" stroke-width="3" stroke-linecap="round" />
      <line x1="30" y1="60" x2="60" y2="60" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
      
      <!-- Laptop Base/Keyboard -->
      <polygon points="0,100 180,100 195,115 -15,115" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
      <line x1="75" y1="110" x2="105" y2="110" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

  <!-- Office Lamp (Left floating, shining light) -->
  <g transform="translate(130, 110)">
    <!-- Base -->
    <rect x="20" y="140" width="40" height="8" rx="2" fill="#475569" />
    <!-- Rod -->
    <path d="M 40 140 Q 10 90, 50 60" fill="none" stroke="#475569" stroke-width="3" />
    <!-- Lamp Head -->
    <path d="M 40 50 L 70 70 L 50 85 Z" fill="#00bcd4" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Light Beam (Yellowish transparency mock) -->
    <polygon points="62,72 130,170 80,190 52,83" fill="#e0f7fa" opacity="0.25" />
  </g>

  <!-- Magnifying Glass & Work Checklist (Right floating) -->
  <g transform="translate(480, 180) rotate(-5)">
    <!-- Checklist Card -->
    <rect x="0" y="0" width="140" height="180" rx="12" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <!-- Header -->
    <rect x="15" y="15" width="40" height="8" rx="2" fill="#00bcd4" />
    <!-- Lines -->
    <line x1="15" y1="45" x2="125" y2="45" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    
    <circle cx="25" cy="75" r="7" fill="none" stroke="#00bcd4" stroke-width="2" />
    <line x1="42" y1="75" x2="110" y2="75" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
    
    <circle cx="25" cy="115" r="7" fill="none" stroke="#00bcd4" stroke-width="2" />
    <path d="M 21 115 L 24 118 L 29 111" fill="none" stroke="#00bcd4" stroke-width="2" stroke-linecap="round" />
    <line x1="42" y1="115" x2="120" y2="115" stroke="#475569" stroke-width="2" stroke-linecap="round" />

    <!-- Magnifying Glass overlaying checklist -->
    <g transform="translate(80, 90) rotate(15)">
      <circle cx="30" cy="30" r="20" fill="#ffffff" fill-opacity="0.6" stroke="#475569" stroke-width="3" />
      <line x1="44" y1="44" x2="65" y2="65" stroke="#475569" stroke-width="4" stroke-linecap="round" />
      <path d="M 20 20 A 10 10 0 0 1 35 15" fill="none" stroke="#00bcd4" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M 440 100 L 443 107 L 450 110 L 443 113 L 440 120 L 437 113 L 430 110 L 437 107 Z" fill="#00bcd4" opacity="0.6" />
  <circle cx="150" cy="330" r="5" fill="#cbd5e1" />
</svg>
