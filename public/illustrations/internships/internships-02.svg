<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Calendar Planner (Internship schedule - Left side) -->
  <g transform="translate(180, 160) rotate(-4)">
    <rect x="5" y="5" width="180" height="180" rx="14" fill="#e2e8f0" />
    <rect x="0" y="0" width="180" height="180" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    
    <!-- Top Header (Cyan) -->
    <path d="M 0 14 Q 0 0, 14 0 L 166 0 Q 180 0, 180 14 L 180 35 L 0 35 Z" fill="#00bcd4" stroke="#475569" stroke-width="3.5" />
    <line x1="30" y1="18" x2="150" y2="18" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" />

    <!-- Calendar grids -->
    <circle cx="35" cy="65" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <circle cx="75" cy="65" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <circle cx="115" cy="65" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <circle cx="155" cy="65" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />

    <circle cx="35" cy="105" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <!-- Target Checked Date -->
    <circle cx="75" cy="105" r="12" fill="#00bcd4" stroke="#475569" stroke-width="2" />
    <path d="M 70 105 L 73 108 L 80 101" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="115" cy="105" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <circle cx="155" cy="105" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />

    <circle cx="35" cy="145" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <circle cx="75" cy="145" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <circle cx="115" cy="145" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
    <circle cx="155" cy="145" r="8" fill="#e0f7fa" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Open briefcase showing files (Right side - Job readiness) -->
  <g transform="translate(420, 180) rotate(5)">
    <!-- Briefcase Front -->
    <rect x="0" y="50" width="200" height="130" rx="12" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    
    <!-- Files popping out -->
    <path d="M 20 50 L 20 10 C 20 10, 180 10, 180 20 L 180 50" fill="#e0f7fa" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <line x1="45" y1="28" x2="155" y2="28" stroke="#00bcd4" stroke-width="3.5" stroke-linecap="round" />
    <line x1="45" y1="40" x2="115" y2="40" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />

    <!-- Clasp/Handle -->
    <path d="M 70 50 L 70 30 C 70 24, 130 24, 130 30 L 130 50" fill="none" stroke="#475569" stroke-width="3.5" />
    <rect x="85" y="70" width="30" height="20" rx="4" fill="#cbd5e1" stroke="#475569" stroke-width="2.5" />
  </g>

  <!-- Sparkles -->
  <path d="M 390 100 L 393 107 L 400 110 L 393 113 L 390 120 L 387 113 L 380 110 L 387 107 Z" fill="#00bcd4" opacity="0.6" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
