<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Graduation cap on Pillar/Book stack (Blue theme - Left) -->
  <g transform="translate(190, 160)">
    <!-- Base books -->
    <rect x="10" y="160" width="160" height="40" rx="4" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="25" y="120" width="130" height="40" rx="4" fill="#3b82f6" stroke="#475569" stroke-width="3" />
    
    <!-- Cap Diamond sitting on top -->
    <polygon points="90,40 160,70 90,100 20,70" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <path d="M 50 82 L 50 110 C 50 118, 130 118, 130 110 L 130 82" fill="#cbd5e1" stroke="#475569" stroke-width="2.5" />
    <!-- Tassel -->
    <path d="M 90 70 L 40 90 L 40 110" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Rolled diploma certificates stacked (Right side) -->
  <g transform="translate(450, 200) rotate(5)">
    <!-- Scroll 1 -->
    <rect x="0" y="20" width="150" height="40" rx="5" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <ellipse cx="0" cy="40" rx="5" ry="20" fill="#3b82f6" stroke="#475569" stroke-width="3" />
    <rect x="60" y="17" width="20" height="46" rx="1" fill="#3b82f6" stroke="#475569" stroke-width="2" />
    
    <!-- Scroll 2 (behind) -->
    <g transform="translate(20, 50) rotate(-10)">
      <rect x="0" y="20" width="150" height="40" rx="5" fill="#f8fafc" stroke="#475569" stroke-width="3" />
      <ellipse cx="0" cy="40" rx="5" ry="20" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
      <rect x="60" y="17" width="20" height="46" rx="1" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M 390 100 L 393 107 L 400 110 L 393 113 L 390 120 L 387 113 L 380 110 L 387 107 Z" fill="#3b82f6" opacity="0.6" />
  <circle cx="160" cy="300" r="5" fill="#cbd5e1" />
</svg>
