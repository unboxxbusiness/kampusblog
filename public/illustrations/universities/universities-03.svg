<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Global University Network map (Indigo theme) -->
  <g transform="translate(230, 130)">
    <!-- Main Map board/canvas -->
    <rect x="0" y="0" width="340" height="240" rx="16" fill="#ffffff" stroke="#475569" stroke-width="4.5" />
    
    <!-- Map grid grids -->
    <path d="M 30 0 C 30 120, 170 120, 170 240 M 170 0 C 170 120, 310 120, 310 240" fill="none" stroke="#e0e7ff" stroke-width="2" />
    <path d="M 0 60 C 120 60, 220 180, 340 180 M 0 180 C 120 180, 220 60, 340 60" fill="none" stroke="#e0e7ff" stroke-width="2" />

    <!-- Country shapes abstract representations -->
    <!-- Shape 1 -->
    <path d="M 40 40 Q 80 50, 90 90 Q 70 130, 30 100 Z" fill="#e0e7ff" stroke="#cbd5e1" stroke-width="2" />
    <!-- Shape 2 -->
    <path d="M 220 50 Q 280 40, 290 80 Q 270 140, 220 100 Z" fill="#e0e7ff" stroke="#cbd5e1" stroke-width="2" />
    <!-- Shape 3 -->
    <path d="M 120 140 Q 180 150, 170 200 Q 130 210, 110 170 Z" fill="#e0e7ff" stroke="#cbd5e1" stroke-width="2" />

    <!-- University pins pointing on map -->
    <!-- Pin 1 (Indigo) -->
    <g transform="translate(60, 50)">
      <path d="M 10 0 C 4 0, 0 4, 0 10 C 0 18, 10 26, 10 26 C 10 26, 20 18, 20 10 C 20 4, 16 0, 10 0 Z" fill="#6366f1" stroke="#475569" stroke-width="2" />
      <circle cx="10" cy="9" r="3.5" fill="#ffffff" />
    </g>
    <!-- Pin 2 (Blue) -->
    <g transform="translate(240, 60)">
      <path d="M 10 0 C 4 0, 0 4, 0 10 C 0 18, 10 26, 10 26 C 10 26, 20 18, 20 10 C 20 4, 16 0, 10 0 Z" fill="#3b82f6" stroke="#475569" stroke-width="2" />
      <circle cx="10" cy="9" r="3.5" fill="#ffffff" />
    </g>
    <!-- Pin 3 (Indigo) -->
    <g transform="translate(130, 150)">
      <path d="M 10 0 C 4 0, 0 4, 0 10 C 0 18, 10 26, 10 26 C 10 26, 20 18, 20 10 C 20 4, 16 0, 10 0 Z" fill="#6366f1" stroke="#475569" stroke-width="2" />
      <circle cx="10" cy="9" r="3.5" fill="#ffffff" />
    </g>
  </g>

  <!-- Books standing on ground (Left side) -->
  <g transform="translate(130, 290)">
    <rect x="0" y="0" width="30" height="120" rx="3" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="30" y="10" width="30" height="110" rx="3" fill="#6366f1" stroke="#475569" stroke-width="3" />
    <line x1="45" y1="25" x2="45" y2="105" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Sparkles -->
  <path d="M 150 100 L 153 107 L 160 110 L 153 113 L 150 120 L 147 113 L 140 110 L 147 107 Z" fill="#6366f1" opacity="0.6" />
  <circle cx="610" cy="220" r="5" fill="#cbd5e1" />
</svg>
