<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Laptop showing University campus portal (Indigo theme) -->
  <g transform="translate(230, 200)">
    <!-- Screen -->
    <rect x="20" y="0" width="300" height="180" rx="12" fill="#ffffff" stroke="#475569" stroke-width="4.5" />
    
    <!-- Portal interface inside screen -->
    <rect x="35" y="15" width="270" height="150" rx="8" fill="#f8fafc" />
    <!-- Classical pillars inside portal screen (indicating university search) -->
    <g transform="translate(95, 30)">
      <rect x="0" y="80" width="150" height="10" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
      <polygon points="5,20 145,20 75,0" fill="#6366f1" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
      <!-- Architrave -->
      <rect x="15" y="20" width="120" height="10" rx="1" fill="#475569" />
      <!-- Columns -->
      <rect x="25" y="30" width="10" height="50" fill="#ffffff" stroke="#475569" stroke-width="2" />
      <rect x="55" y="30" width="10" height="50" fill="#ffffff" stroke="#475569" stroke-width="2" />
      <rect x="85" y="30" width="10" height="50" fill="#ffffff" stroke="#475569" stroke-width="2" />
      <rect x="115" y="30" width="10" height="50" fill="#ffffff" stroke="#475569" stroke-width="2" />
    </g>

    <!-- Laptop Base -->
    <polygon points="-10,180 350,180 375,205 -35,205" fill="#e2e8f0" stroke="#475569" stroke-width="4.5" stroke-linejoin="round" />
    <line x1="130" y1="195" x2="210" y2="195" stroke="#475569" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Global graduation cap floating (Left side) -->
  <g transform="translate(130, 160) rotate(-15)">
    <polygon points="40,10 75,22 40,34 5,22" fill="#6366f1" stroke="#475569" stroke-width="2" stroke-linejoin="round" />
    <path d="M 20 28 L 20 42 C 20 48, 60 48, 60 42 L 60 28" fill="#ffffff" stroke="#475569" stroke-width="2" />
    <circle cx="40" cy="22" r="3" fill="#ffffff" />
  </g>

  <!-- Sparkles -->
  <path d="M 570 120 L 573 127 L 580 130 L 573 133 L 570 140 L 567 133 L 560 130 L 567 127 Z" fill="#6366f1" opacity="0.6" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
