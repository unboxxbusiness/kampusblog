<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Admission Offer Envelope & Letter (Indigo Theme) -->
  <g transform="translate(200, 160) rotate(-6)">
    <!-- Shadow -->
    <rect x="5" y="5" width="220" height="150" rx="12" fill="#e2e8f0" />
    <!-- Envelope Base -->
    <rect x="0" y="0" width="220" height="150" rx="12" fill="#ffffff" stroke="#475569" stroke-width="3" />
    
    <!-- Letter popping out -->
    <path d="M 20 0 L 20 -50 C 20 -58, 200 -58, 200 -50 L 200 0 Z" fill="#faf5ff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <line x1="40" y1="-30" x2="180" y2="-30" stroke="#6366f1" stroke-width="3" stroke-linecap="round" />
    <line x1="40" y1="-15" x2="130" y2="-15" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />

    <!-- Envelope Flap (open/unfolded) -->
    <polygon points="0,0 110,85 220,0" fill="#f5f3ff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Front Flaps -->
    <polygon points="0,150 110,75 0,0" fill="none" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <polygon points="220,150 110,75 220,0" fill="none" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <polygon points="0,150 110,65 220,150" fill="#ffffff" fill-opacity="0.9" stroke="#475569" stroke-width="3" stroke-linejoin="round" />

    <!-- Approved Stamp (Indigo) -->
    <g transform="translate(130, 80) rotate(-15)">
      <rect x="0" y="0" width="70" height="30" rx="4" fill="none" stroke="#6366f1" stroke-width="2" />
      <text x="7" y="21" font-family="sans-serif" font-size="12" font-weight="900" fill="#6366f1">PASSED</text>
    </g>
  </g>

  <!-- Big Admission Key/Badge (Right side) -->
  <g transform="translate(480, 180)">
    <circle cx="60" cy="60" r="50" fill="#f8fafc" stroke="#475569" stroke-width="3" />
    <path d="M 60 25 C 40 25, 40 55, 60 55 C 80 55, 80 25, 60 25" fill="none" stroke="#6366f1" stroke-width="3" />
    <line x1="60" y1="55" x2="60" y2="120" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    <rect x="60" y="90" width="18" height="10" fill="#475569" rx="1" />
    <rect x="60" y="105" width="18" height="10" fill="#475569" rx="1" />
  </g>

  <!-- Sparkles -->
  <path d="M 450 100 L 453 107 L 460 110 L 453 113 L 450 120 L 447 113 L 440 110 L 447 107 Z" fill="#6366f1" opacity="0.7" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
