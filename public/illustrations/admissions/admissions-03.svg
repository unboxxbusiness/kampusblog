<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Admission Student Folder (Indigo Theme) -->
  <g transform="translate(180, 160) rotate(3)">
    <!-- Shadow -->
    <rect x="5" y="5" width="230" height="170" rx="14" fill="#e2e8f0" />
    
    <!-- Folder Back Cover -->
    <path d="M 0 14 Q 0 0, 14 0 L 80 0 L 100 15 L 216 15 Q 230 15, 230 29 L 230 170 Q 230 184, 216 184 L 14 184 Q 0 184, 0 170 Z" fill="#6366f1" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
    
    <!-- Papers inside folder -->
    <path d="M 15 25 C 15 25, 215 25, 215 35 L 215 165 C 215 165, 15 165, 15 155 Z" fill="#ffffff" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
    <line x1="35" y1="50" x2="195" y2="50" stroke="#475569" stroke-width="3.5" stroke-linecap="round" />
    <line x1="35" y1="75" x2="160" y2="75" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
    <line x1="35" y1="100" x2="180" y2="100" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" />

    <!-- Certified verified tick badge overlay -->
    <circle cx="180" cy="130" r="18" fill="#e0f2fe" stroke="#6366f1" stroke-width="2" />
    <path d="M 173 130 L 178 135 L 187 125" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Folder Front Cover (half-open mock) -->
    <path d="M 0 50 L 0 184 Q 0 198, 14 198 L 216 198 Q 230 198, 230 184 L 230 65 L 120 65 Z" fill="#818cf8" fill-opacity="0.95" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
  </g>

  <!-- University Graduation Cap (Right floating - Target) -->
  <g transform="translate(480, 200) rotate(-8)">
    <polygon points="70,10 130,30 70,50 10,30" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <path d="M 35 41 L 35 65 C 35 75, 105 75, 105 65 L 105 41" fill="#f8fafc" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <circle cx="70" cy="30" r="4" fill="#6366f1" />
  </g>

  <!-- Sparkles -->
  <path d="M 460 120 L 463 127 L 470 130 L 463 133 L 460 140 L 457 133 L 450 130 L 457 127 Z" fill="#6366f1" opacity="0.6" />
  <circle cx="140" cy="220" r="5" fill="#cbd5e1" />
</svg>
