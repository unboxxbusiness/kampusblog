<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="none" />
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.5" />

  <!-- Base Platform/Floor -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- University/Institute Gate (Slate & Indigo) -->
  <!-- Left Pillar -->
  <rect x="220" y="220" width="40" height="180" rx="4" fill="#f8fafc" stroke="#475569" stroke-width="3" />
  <rect x="210" y="200" width="60" height="20" rx="2" fill="#6366f1" stroke="#475569" stroke-width="3" />
  <rect x="210" y="400" width="60" height="10" rx="2" fill="#475569" stroke-width="3" />
  
  <!-- Right Pillar -->
  <rect x="380" y="220" width="40" height="180" rx="4" fill="#f8fafc" stroke="#475569" stroke-width="3" />
  <rect x="370" y="200" width="60" height="20" rx="2" fill="#6366f1" stroke="#475569" stroke-width="3" />
  <rect x="370" y="400" width="60" height="10" rx="2" fill="#475569" stroke-width="3" />

  <!-- Arch connecting pillars -->
  <path d="M 240 200 C 240 120, 400 120, 400 200" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="6,6" />
  <circle cx="320" cy="140" r="10" fill="#6366f1" stroke="#475569" stroke-width="3" />

  <!-- Calendar with checked date (Admissions deadline) -->
  <g transform="translate(480, 240)">
    <!-- Shadow Card -->
    <rect x="5" y="5" width="120" height="120" rx="12" fill="#e2e8f0" />
    <!-- Main Card -->
    <rect x="0" y="0" width="120" height="120" rx="12" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <!-- Header Bar -->
    <path d="M 0 12 Q 0 0, 12 0 L 108 0 Q 120 0, 120 12 L 120 30 L 0 30 Z" fill="#6366f1" stroke="#475569" stroke-width="3" />
    <!-- Binder Rings -->
    <rect x="25" y="-10" width="10" height="20" rx="4" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="85" y="-10" width="10" height="20" rx="4" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <!-- Grid dots -->
    <circle cx="30" cy="55" r="5" fill="#94a3b8" />
    <circle cx="60" cy="55" r="5" fill="#94a3b8" />
    <circle cx="90" cy="55" r="5" fill="#94a3b8" />
    <circle cx="30" cy="85" r="5" fill="#94a3b8" />
    <circle cx="90" cy="85" r="5" fill="#94a3b8" />
    <!-- Target Checkmark Date -->
    <circle cx="60" cy="85" r="12" fill="none" stroke="#6366f1" stroke-width="3" />
    <path d="M 55 85 L 59 89 L 66 81" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Admission Checkmark Document (Left Floating) -->
  <g transform="translate(110, 160) rotate(-10)">
    <rect x="0" y="0" width="80" height="110" rx="8" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <line x1="15" y1="25" x2="65" y2="25" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="15" y1="45" x2="50" y2="45" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />
    <line x1="15" y1="65" x2="60" y2="65" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />
    
    <!-- Checklist symbol -->
    <circle cx="20" cy="90" r="8" fill="#e0e7ff" />
    <path d="M 17 90 L 19 92 L 23 88" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Sparkles / Details -->
  <path d="M 450 120 L 455 130 L 465 133 L 455 136 L 450 146 L 445 136 L 435 133 L 445 130 Z" fill="#6366f1" opacity="0.7" />
  <circle cx="160" cy="350" r="6" fill="#cbd5e1" />
  <circle cx="320" cy="270" r="4" fill="#6366f1" />
</svg>
