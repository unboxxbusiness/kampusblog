<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Modern Student desk setup (Blue theme) -->
  <g transform="translate(180, 180)">
    <!-- Main desk organizer/Bookshelf -->
    <rect x="0" y="110" width="110" height="120" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="3" />
    <line x1="0" y1="170" x2="110" y2="170" stroke="#475569" stroke-width="3" />
    <!-- Book binders inside shelf -->
    <rect x="15" y="125" width="20" height="45" fill="#3b82f6" stroke="#475569" stroke-width="2" rx="2" />
    <rect x="40" y="130" width="20" height="40" fill="#cbd5e1" stroke="#475569" stroke-width="2" rx="2" />
    
    <!-- Open Tablet on Desk (Student study portal) -->
    <g transform="translate(140, 90) rotate(2)">
      <rect x="0" y="0" width="160" height="110" rx="10" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
      <rect x="12" y="12" width="136" height="86" rx="4" fill="#e0f2fe" />
      
      <!-- Video lecture play button -->
      <circle cx="80" cy="55" r="16" fill="#3b82f6" stroke="#475569" stroke-width="2" />
      <polygon points="75,48 90,55 75,62" fill="#ffffff" />
    </g>
  </g>

  <!-- Floating Graduation cap and certificate scroll (Right side) -->
  <g transform="translate(500, 150) rotate(-10)">
    <polygon points="50,10 90,25 50,40 10,25" fill="#3b82f6" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
    <rect x="25" y="27" width="50" height="20" rx="2" fill="#ffffff" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Sparkles -->
  <path d="M 460 100 L 463 107 L 470 110 L 463 113 L 460 120 L 457 113 L 450 110 L 457 107 Z" fill="#3b82f6" opacity="0.6" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
