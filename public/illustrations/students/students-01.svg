<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base platform -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Students Studying at a Desk (Blue theme) -->
  <!-- Student 1 (Left desk user) -->
  <g transform="translate(180, 240)">
    <!-- Body/Shoulders -->
    <path d="M 10 170 Q 20 100, 60 100 Q 100 100, 110 170 Z" fill="#e0f2fe" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Head -->
    <circle cx="60" cy="65" r="28" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <!-- Glasses -->
    <rect x="42" y="60" width="16" height="10" rx="2" fill="none" stroke="#3b82f6" stroke-width="2.5" />
    <rect x="62" y="60" width="16" height="10" rx="2" fill="none" stroke="#3b82f6" stroke-width="2.5" />
    <line x1="58" y1="65" x2="62" y2="65" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Student 2 (Right desk user) -->
  <g transform="translate(340, 220)">
    <!-- Body/Shoulders -->
    <path d="M 10 190 Q 20 120, 60 120 Q 100 120, 110 190 Z" fill="#3b82f6" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Head -->
    <circle cx="60" cy="80" r="28" fill="#ffffff" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Shared Desk Workspace Desk Items -->
  <g transform="translate(140, 395)">
    <!-- Desk Slab -->
    <rect x="0" y="0" width="370" height="15" rx="3" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    
    <!-- Open Book on Desk -->
    <polygon points="120,-10 180,-10 195,0 105,0" fill="#ffffff" stroke="#475569" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Coffee Cup -->
    <rect x="250" y="-20" width="22" height="20" rx="3" fill="#ffffff" stroke="#475569" stroke-width="2" />
    <path d="M 272 -15 Q 278 -15, 272 -10" fill="none" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Big Creative Idea Speech Bubble (Right floating) -->
  <g transform="translate(480, 140)">
    <!-- Shadow -->
    <path d="M 15 5 C 15 5, 55 -15, 125 5 C 185 25, 165 105, 125 115 C 105 120, 95 140, 95 140 Q 85 120, 55 115 C 5 105, -5 25, 15 5 Z" fill="#e2e8f0" transform="translate(5, 5)" />
    <!-- Speech Bubble Main -->
    <path d="M 15 5 C 15 5, 55 -15, 125 5 C 185 25, 165 105, 125 115 C 105 120, 95 140, 95 140 Q 85 120, 55 115 C 5 105, -5 25, 15 5 Z" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />

    <!-- Idea Lightbulb/Spark inside -->
    <g transform="translate(65, 30)">
      <circle cx="20" cy="20" r="14" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2" />
      <line x1="20" y1="2" x2="20" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
      <line x1="20" y1="32" x2="20" y2="38" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
      <line x1="2" y1="20" x2="8" y2="20" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
      <line x1="32" y1="20" x2="38" y2="20" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M 150 140 L 153 147 L 160 150 L 153 157 L 150 160 L 147 157 L 140 150 L 147 147 Z" fill="#3b82f6" opacity="0.6" />
  <circle cx="120" cy="300" r="5" fill="#cbd5e1" />
</svg>
