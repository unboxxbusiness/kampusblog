<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base platform -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Exam Answer Sheet/Omit card (Purple theme) -->
  <g transform="translate(180, 160) rotate(-4)">
    <!-- Main Card -->
    <rect x="0" y="0" width="150" height="210" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3" />
    
    <!-- Top Header block -->
    <rect x="20" y="20" width="110" height="15" rx="3" fill="#faf5ff" stroke="#818cf8" stroke-width="2" />
    
    <!-- Answer Bubble rows -->
    <!-- Row 1 -->
    <g transform="translate(20, 55)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="35" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="60" cy="10" r="8" fill="#818cf8" stroke="#475569" stroke-width="2" />
      <circle cx="85" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
    </g>
    <!-- Row 2 -->
    <g transform="translate(20, 85)">
      <circle cx="10" cy="10" r="8" fill="#818cf8" stroke="#475569" stroke-width="2" />
      <circle cx="35" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="60" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="85" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
    </g>
    <!-- Row 3 -->
    <g transform="translate(20, 115)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="35" cy="10" r="8" fill="#818cf8" stroke="#475569" stroke-width="2" />
      <circle cx="60" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="85" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
    </g>
    <!-- Row 4 -->
    <g transform="translate(20, 145)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="35" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="60" cy="10" r="8" fill="none" stroke="#475569" stroke-width="2" />
      <circle cx="85" cy="10" r="8" fill="#818cf8" stroke="#475569" stroke-width="2" />
    </g>
  </g>

  <!-- Pencil writing (overlapping card) -->
  <g transform="translate(300, 140) rotate(35)">
    <polygon points="10,0 20,40 0,40" fill="#f87171" stroke="#475569" stroke-width="2" />
    <rect x="0" y="40" width="20" height="110" fill="#fcd34d" stroke="#475569" stroke-width="3" />
    <rect x="0" y="150" width="20" height="15" fill="#e2e8f0" stroke="#475569" stroke-width="2" />
    <rect x="0" y="165" width="20" height="20" rx="3" fill="#f472b6" stroke="#475569" stroke-width="3" />
    <!-- Graphite Tip -->
    <polygon points="10,0 13,12 7,12" fill="#475569" />
  </g>

  <!-- Stopwatch / Timer (Left, Time management aspect) -->
  <g transform="translate(480, 200)">
    <!-- Watch Frame -->
    <circle cx="60" cy="70" r="50" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <!-- Dial -->
    <circle cx="60" cy="70" r="42" fill="none" stroke="#f3e8ff" stroke-width="2" />
    <!-- Ticking lines -->
    <line x1="60" y1="28" x2="60" y2="36" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="60" y1="104" x2="60" y2="112" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="18" y1="70" x2="26" y2="70" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="94" y1="70" x2="102" y2="70" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <!-- Needle -->
    <path d="M 60 70 L 80 50" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" />
    <circle cx="60" cy="70" r="6" fill="#475569" />
    
    <!-- Top Buttons -->
    <!-- Main stem -->
    <rect x="53" y="10" width="14" height="10" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="48" y="5" width="24" height="6" fill="#475569" rx="2" />
    <!-- Side button -->
    <g transform="translate(90, 28) rotate(45)">
      <rect x="0" y="0" width="10" height="12" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
    </g>
  </g>

  <!-- Sparkles / Marks -->
  <path d="M 150 120 L 153 127 L 160 130 L 153 133 L 150 140 L 147 133 L 140 130 L 147 127 Z" fill="#818cf8" opacity="0.7" />
  <circle cx="430" cy="300" r="5" fill="#cbd5e1" />
</svg>
