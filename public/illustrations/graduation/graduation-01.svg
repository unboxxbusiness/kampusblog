<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base platform -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Graduation Mortarboard Floating in Air (Emerald theme) -->
  <g transform="translate(280, 100)">
    <!-- Cap Diamond -->
    <polygon points="120,20 220,60 120,100 20,60" fill="#10b981" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Cap Skull Base -->
    <path d="M 70 79 L 70 120 C 70 140, 170 140, 170 120 L 170 79" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <!-- Tassel -->
    <path d="M 120 60 L 50 85 L 50 115" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="45" y="115" width="10" height="15" fill="#10b981" stroke="#475569" stroke-width="2" rx="2" />
  </g>

  <!-- Laurel Wreath surrounding the floating cap -->
  <g transform="translate(280, 100)" opacity="0.3">
    <!-- Left Leaf Arc -->
    <path d="M 0 100 A 100 100 0 0 1 20 -10" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" />
    <!-- Right Leaf Arc -->
    <path d="M 240 100 A 100 100 0 0 0 220 -10" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Rolled Diploma / Scroll with Ribbon (Left side pedestal) -->
  <g transform="translate(180, 270) rotate(-12)">
    <!-- Main Scroll -->
    <rect x="0" y="20" width="140" height="40" rx="4" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <!-- Inner roll detail (Left side) -->
    <ellipse cx="0" cy="40" rx="6" ry="20" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    
    <!-- Ribbon tie -->
    <rect x="55" y="17" width="25" height="46" rx="2" fill="#10b981" stroke="#475569" stroke-width="3" />
    <!-- Ribbon tails -->
    <path d="M 60 63 L 50 85 L 65 80 L 75 85 L 70 63" fill="#10b981" stroke="#475569" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- Podium / Steps of Success (Right side structure) -->
  <g transform="translate(480, 250)">
    <rect x="0" y="110" width="140" height="50" rx="4" fill="#f8fafc" stroke="#475569" stroke-width="3" />
    <rect x="25" y="60" width="90" height="50" rx="3" fill="#e2e8f0" stroke="#475569" stroke-width="3" />
    <!-- Star achievement logo on center podium -->
    <path d="M 70 75 L 73 81 L 80 82 L 75 87 L 76 94 L 70 90 L 64 94 L 65 87 L 60 82 L 67 81 Z" fill="#10b981" stroke="#475569" stroke-width="1.5" />
  </g>

  <!-- Sparkles -->
  <path d="M 520 130 L 523 137 L 530 140 L 523 143 L 520 150 L 517 143 L 510 140 L 517 137 Z" fill="#10b981" opacity="0.6" />
  <circle cx="160" cy="200" r="5" fill="#cbd5e1" />
</svg>
