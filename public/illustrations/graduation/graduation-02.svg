<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Classical column with graduation cap (Emerald Theme - Left) -->
  <g transform="translate(190, 160)">
    <!-- Column base/pedestal -->
    <rect x="20" y="190" width="100" height="30" rx="3" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="30" y="100" width="80" height="90" fill="#ffffff" stroke="#475569" stroke-width="3" />
    
    <!-- Vertical column lines -->
    <line x1="50" y1="100" x2="50" y2="190" stroke="#cbd5e1" stroke-width="2" />
    <line x1="70" y1="100" x2="70" y2="190" stroke="#cbd5e1" stroke-width="2" />
    <line x1="90" y1="100" x2="90" y2="190" stroke="#cbd5e1" stroke-width="2" />

    <!-- Column Cap -->
    <rect x="20" y="80" width="100" height="20" rx="3" fill="#cbd5e1" stroke="#475569" stroke-width="3" />

    <!-- Mortarboard sitting on column -->
    <g transform="translate(-10, 10) rotate(-6)">
      <polygon points="60,10 110,25 60,40 10,25" fill="#10b981" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
      <path d="M 25 29 L 25 45 C 25 50, 95 50, 95 45 L 95 29" fill="#ffffff" stroke="#475569" stroke-width="2" />
    </g>
  </g>

  <!-- Rolled Diploma / Certificate stack (Right side) -->
  <g transform="translate(450, 200) rotate(5)">
    <!-- Scroll 1 -->
    <rect x="0" y="20" width="150" height="40" rx="5" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <ellipse cx="0" cy="40" rx="5" ry="20" fill="#10b981" stroke="#475569" stroke-width="3" />
    <rect x="60" y="17" width="20" height="46" rx="1" fill="#10b981" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Sparkles -->
  <path d="M 390 100 L 393 107 L 400 110 L 393 113 L 390 120 L 387 113 L 380 110 L 387 107 Z" fill="#10b981" opacity="0.6" />
  <circle cx="160" cy="300" r="5" fill="#cbd5e1" />
</svg>
