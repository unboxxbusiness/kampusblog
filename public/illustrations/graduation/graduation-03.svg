<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Celebratory silhouettes & Tossing Mortarboard caps (Emerald Theme) -->
  <!-- Silhouettes of students -->
  <g transform="translate(240, 260)">
    <!-- Student 1 -->
    <path d="M 10 150 Q 20 80, 50 80 Q 80 80, 90 150 Z" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <circle cx="50" cy="45" r="22" fill="#ffffff" stroke="#475569" stroke-width="3" />
    
    <!-- Student 2 -->
    <path d="M 120 150 Q 130 90, 160 90 Q 190 90, 200 150 Z" fill="#10b981" stroke="#475569" stroke-width="3" />
    <circle cx="160" cy="55" r="22" fill="#ffffff" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Flying graduation caps in sky -->
  <!-- Cap 1 (High left) -->
  <g transform="translate(180, 80) rotate(-25)">
    <polygon points="50,10 90,25 50,40 10,25" fill="#10b981" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
    <path d="M 25 27 L 25 40 M 50 40 L 50 60" stroke="#475569" stroke-width="2" />
  </g>
  <!-- Cap 2 (High center) -->
  <g transform="translate(380, 60) rotate(15)">
    <polygon points="50,10 90,25 50,40 10,25" fill="#ffffff" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
    <path d="M 25 27 L 25 40 M 50 40 L 50 60" stroke="#475569" stroke-width="2" />
  </g>
  <!-- Cap 3 (High right) -->
  <g transform="translate(540, 90) rotate(-10)">
    <polygon points="50,10 90,25 50,40 10,25" fill="#10b981" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
    <path d="M 25 27 L 25 40 M 50 40 L 50 60" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Sparkles -->
  <path d="M 320 140 L 323 147 L 330 150 L 323 153 L 320 160 L 317 153 L 310 150 L 317 147 Z" fill="#10b981" opacity="0.6" />
  <circle cx="120" cy="220" r="5" fill="#cbd5e1" />
</svg>
