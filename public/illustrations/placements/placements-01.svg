<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base platform line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Professional Placement Briefcase (Left side) -->
  <g transform="translate(160, 200) rotate(-5)">
    <!-- Shadow -->
    <rect x="5" y="5" width="180" height="130" rx="12" fill="#e2e8f0" />
    
    <!-- Briefcase Body -->
    <rect x="0" y="0" width="180" height="130" rx="12" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    
    <!-- Handle (Orange) -->
    <path d="M 60 0 L 60 -18 C 60 -24, 120 -24, 120 -18 L 120 0" fill="none" stroke="#f97316" stroke-width="3.5" stroke-linejoin="round" />
    <!-- Straps/Locks -->
    <rect x="35" y="30" width="20" height="100" fill="#f97316" stroke="#475569" stroke-width="3" rx="2" />
    <rect x="125" y="30" width="20" height="100" fill="#f97316" stroke="#475569" stroke-width="3" rx="2" />
    <!-- Metal Clip/Lock details -->
    <circle cx="45" cy="50" r="4" fill="#ffffff" />
    <circle cx="135" cy="50" r="4" fill="#ffffff" />
  </g>

  <!-- Corporate Placement Handshake (Right side) -->
  <g transform="translate(430, 160)">
    <!-- Right Sleeve (Grey) -->
    <path d="M 180 80 L 120 80 L 125 130 L 180 130 Z" fill="#cbd5e1" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <line x1="120" y1="80" x2="125" y2="130" stroke="#475569" stroke-width="3" />

    <!-- Left Sleeve (Orange) -->
    <path d="M 0 50 L 60 50 L 55 100 L 0 100 Z" fill="#f97316" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    <line x1="60" y1="50" x2="55" y2="100" stroke="#475569" stroke-width="3" />

    <!-- Handshake Fingers/Grip Composition (Slate Lines) -->
    <circle cx="95" cy="75" r="28" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <path d="M 60 55 C 60 55, 90 40, 105 60 C 115 70, 95 90, 85 90 C 75 90, 60 75, 60 75 Z" fill="#ffffff" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Shaking lines (Action/Success indicator) -->
    <path d="M 115 95 C 115 95, 110 105, 95 100" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 125 85 C 125 85, 120 95, 105 90" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Placement Growth/Trend graph arrow (Success metric) -->
  <g transform="translate(350, 100)">
    <path d="M 20 80 Q 50 30, 90 20" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="4,4" />
    <path d="M 80 20 L 90 20 L 90 30" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" />
    <circle cx="20" cy="80" r="5" fill="#f97316" />
  </g>

  <!-- Sparkles -->
  <path d="M 390 60 L 393 67 L 400 70 L 393 73 L 390 80 L 387 73 L 380 70 L 387 67 Z" fill="#10b981" opacity="0.7" />
  <circle cx="390" cy="270" r="5" fill="#cbd5e1" />
</svg>
