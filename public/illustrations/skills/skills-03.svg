<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Brain Cogwheel Machinery (Skills focus - Center) -->
  <g transform="translate(260, 110)">
    <!-- Left Brain half -->
    <path d="M 140 160 C 100 160, 80 140, 80 120 C 80 90, 100 80, 110 80 C 100 60, 120 30, 150 30 C 170 30, 185 45, 190 60 L 190 160 Z" fill="none" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
    <!-- Right Brain half -->
    <path d="M 190 160 C 230 160, 250 140, 250 120 C 250 90, 230 80, 220 80 C 230 60, 210 30, 180 30 C 160 30, 145 45, 140 60 L 140 160 Z" fill="none" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />

    <!-- Cogwheels inside brain (Orange) -->
    <!-- Gear 1 -->
    <g transform="translate(110, 80)">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#f97316" stroke-width="3.5" />
      <circle cx="20" cy="20" r="6" fill="#f97316" />
      <rect x="17" y="0" width="6" height="6" fill="#f97316" stroke="#475569" stroke-width="1" />
      <rect x="17" y="34" width="6" height="6" fill="#f97316" stroke="#475569" stroke-width="1" />
    </g>
    <!-- Gear 2 -->
    <g transform="translate(150, 100)">
      <circle cx="15" cy="15" r="14" fill="none" stroke="#f97316" stroke-width="3" />
      <circle cx="15" cy="15" r="5" fill="#f97316" />
    </g>
  </g>

  <!-- Laptop showing tools on table (Left side) -->
  <g transform="translate(130, 240)">
    <rect x="0" y="60" width="130" height="90" rx="6" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <polygon points="-10,150 140,150 150,165 -20,165" fill="#cbd5e1" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
  </g>

  <!-- Sparkles -->
  <path d="M 520 120 L 523 127 L 530 130 L 523 133 L 520 140 L 517 133 L 510 130 L 517 127 Z" fill="#f97316" opacity="0.6" />
  <circle cx="180" cy="220" r="5" fill="#cbd5e1" />
</svg>
