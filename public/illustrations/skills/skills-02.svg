<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Code window with interlocked gears (Orange theme - Left) -->
  <g transform="translate(180, 160) rotate(-3)">
    <rect x="0" y="0" width="180" height="210" rx="14" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <path d="M 0 14 Q 0 0, 14 0 L 166 0 Q 180 0, 180 14 L 180 35 L 0 35 Z" fill="#fff7ed" stroke="#475569" stroke-width="3.5" />
    <circle cx="15" cy="18" r="4" fill="#ff7043" />
    <circle cx="30" cy="18" r="4" fill="#ffb74d" />
    <circle cx="45" cy="18" r="4" fill="#81c784" />

    <!-- Code rows -->
    <line x1="20" y1="55" x2="100" y2="55" stroke="#f97316" stroke-width="3.5" stroke-linecap="round" />
    <line x1="20" y1="80" x2="140" y2="80" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="20" y1="105" x2="120" y2="105" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Skill badge/award shield (Right side) -->
  <g transform="translate(480, 190) rotate(5)">
    <circle cx="60" cy="60" r="50" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <circle cx="60" cy="60" r="38" fill="#fdf2e9" stroke="#f97316" stroke-width="2" />
    
    <!-- Code bracket symbol inside award badge -->
    <path d="M 45 48 L 35 60 L 45 72 M 75 48 L 85 60 L 75 72" fill="none" stroke="#f97316" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Sparkles -->
  <path d="M 400 120 L 403 127 L 410 130 L 403 133 L 400 140 L 397 133 L 390 130 L 397 137 Z" fill="#f97316" opacity="0.7" />
  <circle cx="150" cy="220" r="5" fill="#cbd5e1" />
</svg>
