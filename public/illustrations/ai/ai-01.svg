<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Robot AI Assistant Core (Purple/Blue themed - Center Right) -->
  <g transform="translate(420, 110)">
    <!-- Base / Neck -->
    <rect x="90" y="200" width="40" height="40" rx="4" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <line x1="98" y1="215" x2="122" y2="215" stroke="#475569" stroke-width="2" />
    
    <!-- Face/Display screen -->
    <rect x="40" y="70" width="140" height="130" rx="24" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <!-- Outer Ears/Antenna nodes -->
    <rect x="25" y="115" width="15" height="40" rx="5" fill="#a78bfa" stroke="#475569" stroke-width="3" />
    <rect x="180" y="115" width="15" height="40" rx="5" fill="#a78bfa" stroke="#475569" stroke-width="3" />
    
    <!-- Inside Screen Details (Digital Face) -->
    <rect x="55" y="85" width="110" height="100" rx="16" fill="#1e1b4b" />
    
    <!-- AI Emo Eyes -->
    <ellipse cx="85" cy="125" rx="10" ry="14" fill="#a78bfa" />
    <ellipse cx="135" cy="125" rx="10" ry="14" fill="#a78bfa" />
    
    <!-- Waveform mouth representation -->
    <path d="M 85 160 Q 110 170, 135 160" fill="none" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round" />

    <!-- Antenna stem and glowing top -->
    <line x1="110" y1="70" x2="110" y2="35" stroke="#475569" stroke-width="3" />
    <circle cx="110" cy="27" r="10" fill="#a78bfa" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Brain Circuit CPU (Left side) -->
  <g transform="translate(160, 150)">
    <!-- Main Silicon Chip base -->
    <rect x="20" y="20" width="160" height="160" rx="14" fill="#faf5ff" stroke="#475569" stroke-width="3.5" />
    
    <!-- Connector pins poking out -->
    <line x1="50" y1="5" x2="50" y2="20" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="100" y1="5" x2="100" y2="20" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="150" y1="5" x2="150" y2="20" stroke="#475569" stroke-width="3" stroke-linecap="round" />

    <line x1="50" y1="180" x2="50" y2="195" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="100" y1="180" x2="100" y2="195" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="150" y1="180" x2="150" y2="195" stroke="#475569" stroke-width="3" stroke-linecap="round" />

    <line x1="5" y1="60" x2="20" y2="60" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="5" y1="100" x2="20" y2="100" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="5" y1="140" x2="20" y2="140" stroke="#475569" stroke-width="3" stroke-linecap="round" />

    <line x1="180" y1="60" x2="195" y2="60" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="180" y1="100" x2="195" y2="100" stroke="#475569" stroke-width="3" stroke-linecap="round" />
    <line x1="180" y1="140" x2="195" y2="140" stroke="#475569" stroke-width="3" stroke-linecap="round" />

    <!-- Circular Brain nodes inside Chip -->
    <circle cx="100" cy="100" r="30" fill="none" stroke="#a78bfa" stroke-width="3" />
    <circle cx="70" cy="70" r="10" fill="#a78bfa" stroke="#475569" stroke-width="2" />
    <circle cx="130" cy="70" r="10" fill="#a78bfa" stroke="#475569" stroke-width="2" />
    <circle cx="70" cy="130" r="10" fill="#a78bfa" stroke="#475569" stroke-width="2" />
    <circle cx="130" cy="130" r="10" fill="#a78bfa" stroke="#475569" stroke-width="2" />

    <!-- Circuit tracks -->
    <path d="M 80 70 L 120 70" stroke="#475569" stroke-width="2" />
    <path d="M 70 80 L 70 120" stroke="#475569" stroke-width="2" />
    <path d="M 130 80 L 130 120" stroke="#475569" stroke-width="2" />
  </g>

  <!-- Sparkles -->
  <path d="M 370 70 L 373 77 L 380 80 L 373 83 L 370 90 L 367 83 L 360 80 L 367 77 Z" fill="#a78bfa" opacity="0.7" />
  <circle cx="370" cy="270" r="5" fill="#cbd5e1" />
</svg>
