<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- Laptop showing AI analytics (Left side) -->
  <g transform="translate(180, 200)">
    <!-- Screen -->
    <rect x="20" y="0" width="220" height="130" rx="10" fill="#ffffff" stroke="#475569" stroke-width="3.5" />
    <rect x="32" y="12" width="196" height="106" rx="6" fill="#faf5ff" />
    <!-- Graph inside laptop screen -->
    <path d="M 45 90 Q 75 50, 115 80 T 185 45" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" />
    <circle cx="185" cy="45" r="4.5" fill="#a78bfa" stroke="#475569" stroke-width="1.5" />

    <!-- Base -->
    <polygon points="-10,130 250,130 265,145 -25,145" fill="#cbd5e1" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
  </g>

  <!-- Robotic Arm coding/pointing (AI Automation - Right side) -->
  <g transform="translate(480, 130) rotate(-10)">
    <!-- Base stand on ground -->
    <rect x="30" y="180" width="80" height="20" rx="3" fill="#475569" />
    
    <!-- Arm Segment 1 -->
    <rect x="55" y="100" width="20" height="90" rx="4" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <!-- Joint 1 -->
    <circle cx="65" cy="100" r="14" fill="#ffffff" stroke="#475569" stroke-width="3" />
    <circle cx="65" cy="100" r="5" fill="#a78bfa" />
    
    <!-- Arm Segment 2 (pointing to laptop screen) -->
    <g transform="translate(65, 100) rotate(-60)">
      <rect x="-10" y="-100" width="20" height="100" rx="4" fill="#ffffff" stroke="#475569" stroke-width="3" />
      
      <!-- Robotic Gripper/Claw hand -->
      <path d="M -15 -100 L -5 -120 L 5 -120 L 15 -100" fill="none" stroke="#475569" stroke-width="3" stroke-linejoin="round" />
      <!-- Lasor glow pointer -->
      <circle cx="0" cy="-125" r="5" fill="#a78bfa" />
    </g>
  </g>

  <!-- Sparkles -->
  <path d="M 450 80 L 453 87 L 460 90 L 453 93 L 450 100 L 447 93 L 440 90 L 447 87 Z" fill="#a78bfa" opacity="0.6" />
  <circle cx="150" cy="300" r="5" fill="#cbd5e1" />
</svg>
