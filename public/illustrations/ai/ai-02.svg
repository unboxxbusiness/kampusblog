<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Base line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />

  <!-- AI Smart Lightbulb with Circuit Board Filament (Purple theme - Center) -->
  <g transform="translate(290, 110)">
    <!-- Glow behind bulb -->
    <circle cx="80" cy="90" r="75" fill="#faf5ff" opacity="0.4" />
    
    <!-- Bulb Glass Outline -->
    <path d="M 80 30 C 40 30, 30 75, 50 100 L 50 130 L 110 130 L 110 100 C 130 75, 120 30, 80 30 Z" fill="#ffffff" stroke="#475569" stroke-width="3.5" stroke-linejoin="round" />
    
    <!-- Circuit Board Pattern inside bulb -->
    <rect x="68" y="70" width="24" height="35" rx="4" fill="#a78bfa" stroke="#475569" stroke-width="2" />
    <!-- Connecting tracks -->
    <path d="M 80 50 L 80 70 M 60 85 L 68 85 M 92 85 L 100 85 M 80 105 L 80 130" stroke="#475569" stroke-width="2" stroke-linecap="round" />
    <circle cx="80" cy="46" r="4" fill="#a78bfa" />
    <circle cx="56" cy="85" r="4" fill="#a78bfa" />
    <circle cx="104" cy="85" r="4" fill="#a78bfa" />

    <!-- Metal Base -->
    <rect x="65" y="130" width="30" height="8" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <rect x="68" y="138" width="24" height="8" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="3" />
    <path d="M 72 146 Q 80 152, 88 146" fill="none" stroke="#475569" stroke-width="3" />
  </g>

  <!-- Sparkles -->
  <path d="M 210 100 L 213 107 L 220 110 L 213 113 L 210 120 L 207 113 L 200 110 L 207 107 Z" fill="#a78bfa" opacity="0.6" />
  <circle cx="590" cy="220" r="5" fill="#cbd5e1" />
</svg>
